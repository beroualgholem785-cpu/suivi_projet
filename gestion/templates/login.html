<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin-top: 100px;
        }

        form {
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h2>🔐 Connexion</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Se connecter</button>
</form>

</body>
</html>
